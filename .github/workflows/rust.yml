name: Build and Release Rust Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: dashword-x86_64-unknown-linux-gnu.zip
            binary_name: dashword
            binary_path: target/x86_64-unknown-linux-gnu/release/dashword

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: dashword-x86_64-pc-windows-msvc.zip
            binary_name: dashword.exe
            binary_path: target/x86_64-pc-windows-msvc/release/dashword.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: dashword-x86_64-apple-darwin.zip
            binary_name: dashword
            binary_path: target/x86_64-apple-darwin/release/dashword

          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: dashword-aarch64-apple-darwin.zip
            binary_name: dashword
            binary_path: target/aarch64-apple-darwin/release/dashword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Enable Rust caching
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile project in release mode
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package distributable zip
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist package
          mkdir -p dist package
          cp "${{ matrix.binary_path }}" "package/${{ matrix.binary_name }}"
          (cd package && zip -9 "../dist/${{ matrix.archive_name }}" "${{ matrix.binary_name }}")

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release and upload assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify only zip assets are present
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release-assets
          find release-assets -maxdepth 1 -type f ! -name '*.zip' -print -quit | grep -q . && {
            echo "Found non-zip files in release-assets; failing."
            exit 1
          } || true
          test -n "$(find release-assets -maxdepth 1 -type f -name '*.zip' -print -quit)" || {
            echo "No zip files found."
            exit 1
          }

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "release-assets/*.zip,release-assets/SHA256SUMS.txt"
          artifactErrorsFailBuild: true
          replacesArtifacts: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

          
