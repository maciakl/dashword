name: Build Rust Binaries

on:
  release:
    types: [published]


jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: my-app-linux
            binary_path: target/x86_64-unknown-linux-gnu/release/dashword
            
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: my-app-windows
            binary_path: target/x86_64-pc-windows-msvc/release/dashword.exe
            
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: my-app-mac-intel
            binary_path: target/x86_64-apple-darwin/release/dashword

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: my-app-mac-apple-silicon
            binary_path: target/aarch64-apple-darwin/release/dashword

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Enable Rust caching
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Compile project in release mode
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload compiled binary as artifact
      uses: actions/artifacts@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.binary_path }}
