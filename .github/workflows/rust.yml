name: Build and Release Rust Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: dashword-x86_64-unknown-linux-gnu.zip
            binary_name: dashword
            binary_path: target/x86_64-unknown-linux-gnu/release/dashword

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: dashword-x86_64-pc-windows-msvc.zip
            binary_name: dashword.exe
            binary_path: target/x86_64-pc-windows-msvc/release/dashword.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: dashword-x86_64-apple-darwin.zip
            binary_name: dashword
            binary_path: target/x86_64-apple-darwin/release/dashword

          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: dashword-aarch64-apple-darwin.zip
            binary_name: dashword
            binary_path: target/aarch64-apple-darwin/release/dashword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Enable Rust caching
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile project in release mode
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package distributable zip
        shell: bash
        run: |
          mkdir -p dist package
          cp "${{ matrix.binary_path }}" "package/${{ matrix.binary_name }}"
          (cd package && zip -9 "../dist/${{ matrix.archive_name }}" "${{ matrix.binary_name }}")

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}

  release:
    name: Create GitHub Release and upload assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts into release-assets directory
        shell: bash
        run: |
          mkdir -p release-assets
          find dist -type f -name '*.zip' -maxdepth 2 -print0 | while IFS= read -r -d '' file; do
            cp "$file" release-assets/"$(basename "$file")"
          done

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
