name: Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a version tag like v1.0.0

permissions:
  contents: write # Crucial permission allowing the runner to upload assets to the release

jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: dashword_x86_64-unknown-linux-gnu
          - os: windows-latest
            target: dashword_x86_64-pc-windows-msvc
          - os: macos-latest
            target: dashword_x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin # Apple Silicon (M1/M2/M3)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtlnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build and Upload to Release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dashword
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
